pre-commit:
  commands:
    gofmt:
      glob: "**/*.go"
      run: sh scripts/gofmt-check.sh {staged_files}
      fail_text: |
        フォーマットされていないファイルがあります。
        `gofmt -w <ファイル名>` を実行してください。

pre-push:
  commands:
    lint:
      run: golangci-lint run ./cmd/... ./internal/...
      fail_text: |
        golangci-lint でエラーが検出されました。
        プッシュ前に修正してください。
    test:
      run: go test ./...
      fail_text: |
        テストが失敗しました。
        プッシュ前に修正してください。
